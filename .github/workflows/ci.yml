name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build package
        run: npm run build
      - name: Docker build smoke
        run: docker build -f docker/remote-agent/Dockerfile -t mission-control-agent:ci .
